name: Reality Protocol Tests

on:
  push:
    branches: [ main, dev, develop, codex/**, claude/** ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE*'
  pull_request:
    branches: [ main, dev, develop ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'LICENSE*'

# Cancel in-progress runs when a new workflow is triggered on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SINGBOX_MIN_VERSION: "1.8.0"
  SINGBOX_RECOMMENDED_VERSION: "1.13.0"
  COVERAGE_MIN_PERCENT: "30"
  COVERAGE_TARGET_PERCENT: "80"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/apt
          key: ${{ runner.os }}-test-deps-v1-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: |
            ${{ runner.os }}-test-deps-v1-
            ${{ runner.os }}-test-deps-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq openssl
          jq --version
          openssl version

      - name: Run Reality validation tests
        run: |
          echo "# Reality Protocol Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if bash tests/test_reality.sh; then
            echo "✅ All Reality validation tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Reality validation tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Validate bootstrap constants
        run: |
          echo "## Bootstrap Constants Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Prevents recurring 'unbound variable' errors during bootstrap." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if bash tests/unit/test_bootstrap_constants.sh; then
            echo "✅ All 15 bootstrap constants properly configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Validated:**" >> $GITHUB_STEP_SUMMARY
            echo "- Download constants (5)" >> $GITHUB_STEP_SUMMARY
            echo "- Network constants (1)" >> $GITHUB_STEP_SUMMARY
            echo "- Reality validation (2)" >> $GITHUB_STEP_SUMMARY
            echo "- Reality config (5)" >> $GITHUB_STEP_SUMMARY
            echo "- Permissions (2)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Bootstrap constants validation FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**This prevents recurring unbound variable errors that have caused 6+ production bugs.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See test output above for remediation steps." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Test strict mode (bash -nu)
        run: |
          echo "## Strict Mode Validation (bash -nu)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test syntax with unbound variable detection (bash -nu)
          # This validates early constants without executing the script
          if bash -nu install.sh 2>&1 | tee /tmp/strict-test.log; then
            echo "✅ Syntax valid, no unbound variables in early initialization" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Syntax errors or unbound variables found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/strict-test.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  integration-tests:
    name: Integration Tests (sing-box ${{ matrix.version }})
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/codex/') || startsWith(github.ref, 'refs/heads/claude/')
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        version: ['latest', '1.13.0', '1.12.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Cache sing-box binary
        id: cache-singbox
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/sing-box-download
          key: ${{ runner.os }}-singbox-${{ matrix.version }}-v1-${{ hashFiles('.github/workflows/test.yml') }}

      - name: Install sing-box ${{ matrix.version }}
        if: steps.cache-singbox.outputs.cache-hit != 'true'
        run: |
          bash tests/ci/install_singbox.sh --version "${{ matrix.version }}" --download-dir /tmp/sing-box-download --fallback-version "$SINGBOX_RECOMMENDED_VERSION"

      - name: Setup sing-box binary
        run: |
          sudo cp /tmp/sing-box-download/sing-box-*/sing-box /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq openssl

      - name: Run integration checks
        env:
          SINGBOX_TEST_VERSION: ${{ matrix.version }}
        run: |
          bash tests/ci/integration_checks.sh --summary-file "$GITHUB_STEP_SUMMARY"

  advanced-features:
    name: Advanced Features Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 12

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Cache sing-box binary
        id: cache-singbox
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/sing-box-download
          key: ${{ runner.os }}-singbox-latest-v1-${{ hashFiles('.github/workflows/test.yml') }}

      - name: Install sing-box
        if: steps.cache-singbox.outputs.cache-hit != 'true'
        run: |
          bash tests/ci/install_singbox.sh --version latest --download-dir /tmp/sing-box-download --fallback-version "$SINGBOX_RECOMMENDED_VERSION"

      - name: Setup sing-box binary
        run: |
          sudo cp /tmp/sing-box-download/sing-box-*/sing-box /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq openssl

      - name: Run advanced feature checks
        run: |
          bash tests/ci/advanced_features_checks.sh --summary-file "$GITHUB_STEP_SUMMARY"

  docker-lifecycle-smoke:
    name: Docker Lifecycle Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/codex/') || startsWith(github.ref, 'refs/heads/claude/')
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Run Docker lifecycle smoke test
        run: |
          echo "# Docker Lifecycle Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if bash scripts/e2e/install-lifecycle-smoke.sh; then
            echo "✅ Docker lifecycle scenarios passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Docker lifecycle scenarios failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  test-coverage:
    name: Test Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: always()
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Cache sing-box binary
        id: cache-singbox-coverage
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/sing-box-download
          key: ${{ runner.os }}-singbox-coverage-latest-v1-${{ hashFiles('.github/workflows/test.yml') }}

      - name: Install sing-box latest
        if: steps.cache-singbox-coverage.outputs.cache-hit != 'true'
        run: |
          bash tests/ci/install_singbox.sh --version latest --download-dir /tmp/sing-box-download --fallback-version "$SINGBOX_RECOMMENDED_VERSION"

      - name: Setup sing-box binary
        run: |
          sudo cp /tmp/sing-box-download/sing-box-*/sing-box /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq openssl

      - name: Run kcov coverage suite
        run: |
          echo "# Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## kcov Real Execution Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          KCOV_BIN=$(bash tests/ci/install_kcov.sh --version v41)
          echo "Using kcov binary: $KCOV_BIN" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SUITE_LOG="/tmp/sbx-kcov-suite.log"
          bash tests/ci/coverage_suite.sh --out-dir /tmp/sbx-kcov --summary-file "$GITHUB_STEP_SUMMARY" --kcov-bin "$KCOV_BIN" | tee "$SUITE_LOG"

          COVERAGE_XML=$(awk -F= '/^COVERAGE_XML=/{print substr($0, index($0, "=") + 1)}' "$SUITE_LOG" | tail -n 1)
          COVERAGE_DIR=$(awk -F= '/^COVERAGE_DIR=/{print substr($0, index($0, "=") + 1)}' "$SUITE_LOG" | tail -n 1)

          if [[ -z "$COVERAGE_XML" ]] || [[ ! -f "$COVERAGE_XML" ]]; then
            echo "::error::coverage suite did not provide a valid COVERAGE_XML path"
            exit 1
          fi

          if [[ -z "$COVERAGE_DIR" ]] || [[ ! -d "$COVERAGE_DIR" ]]; then
            echo "::error::coverage suite did not provide a valid COVERAGE_DIR path"
            exit 1
          fi

          echo "COVERAGE_XML=$COVERAGE_XML" >> "$GITHUB_ENV"
          echo "COVERAGE_DIR=$COVERAGE_DIR" >> "$GITHUB_ENV"
          echo "- Coverage XML Path: \`$COVERAGE_XML\`" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage Report Path: \`$COVERAGE_DIR\`" >> $GITHUB_STEP_SUMMARY

      - name: Enforce coverage gate
        run: |
          bash tests/ci/coverage_gate.sh \
            --xml "$COVERAGE_XML" \
            --min-percent "$COVERAGE_MIN_PERCENT" \
            --metrics-file /tmp/sbx-kcov/coverage-metrics.env

          source /tmp/sbx-kcov/coverage-metrics.env
          echo "## Coverage Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: **${COVERAGE_PERCENT}%**" >> $GITHUB_STEP_SUMMARY
          echo "- Threshold: **${COVERAGE_THRESHOLD}%**" >> $GITHUB_STEP_SUMMARY
          echo "- Long-term Target: **${COVERAGE_TARGET_PERCENT}%**" >> $GITHUB_STEP_SUMMARY
          echo "- Result: **${COVERAGE_GATE_STATUS}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")*" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kcov-coverage-report
          path: /tmp/sbx-kcov/merged
          if-no-files-found: error

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, advanced-features, docker-lifecycle-smoke, test-coverage]
    if: always()
    timeout-minutes: 2

    steps:
      - name: Generate final summary
        run: |
          echo "# Reality Protocol Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Passed' || (needs.integration-tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Advanced Features | ${{ needs.advanced-features.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Lifecycle Smoke | ${{ needs.docker-lifecycle-smoke.result == 'success' && '✅ Passed' || (needs.docker-lifecycle-smoke.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Report | ${{ needs.test-coverage.result == 'success' && '✅ Generated' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.advanced-features.result }}" == "success" ]] && \
             [[ "${{ needs.docker-lifecycle-smoke.result }}" != "failure" ]] && \
             [[ "${{ needs.test-coverage.result }}" == "success" ]]; then
            echo "**Overall**: ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Overall**: ❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check overall status
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.advanced-features.result }}" != "success" ]] || \
             [[ "${{ needs.test-coverage.result }}" != "success" ]]; then
            echo "::error::One or more test suites failed"
            exit 1
          fi

          # Integration tests are allowed to be skipped
          if [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "::error::Integration tests failed"
            exit 1
          fi

          # Docker lifecycle smoke tests are allowed to be skipped
          if [[ "${{ needs.docker-lifecycle-smoke.result }}" == "failure" ]]; then
            echo "::error::Docker lifecycle smoke tests failed"
            exit 1
          fi
